<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="sky1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="50%" style="stop-color:#0d2144"/>
      <stop offset="100%" style="stop-color:#1a3a6b"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#0288d1;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="horizon" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e88e5;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background sky -->
  <rect width="800" height="450" fill="url(#sky1)"/>

  <!-- Stars -->
  <g opacity="0.8">
    <circle cx="50" cy="40" r="1.5" fill="white" opacity="0.9"/>
    <circle cx="120" cy="25" r="1" fill="white" opacity="0.7"/>
    <circle cx="200" cy="60" r="2" fill="white" opacity="0.8"/>
    <circle cx="280" cy="30" r="1" fill="white" opacity="0.6"/>
    <circle cx="350" cy="50" r="1.5" fill="white" opacity="0.9"/>
    <circle cx="420" cy="20" r="1" fill="white" opacity="0.7"/>
    <circle cx="500" cy="45" r="2" fill="white" opacity="0.8"/>
    <circle cx="580" cy="35" r="1" fill="white" opacity="0.6"/>
    <circle cx="650" cy="55" r="1.5" fill="white" opacity="0.9"/>
    <circle cx="720" cy="25" r="1" fill="white" opacity="0.7"/>
    <circle cx="760" cy="70" r="2" fill="white" opacity="0.8"/>
    <circle cx="90" cy="90" r="1" fill="white" opacity="0.5"/>
    <circle cx="160" cy="110" r="1.5" fill="white" opacity="0.7"/>
    <circle cx="340" cy="80" r="1" fill="white" opacity="0.6"/>
    <circle cx="460" cy="95" r="1.5" fill="white" opacity="0.8"/>
    <circle cx="620" cy="85" r="1" fill="white" opacity="0.5"/>
    <circle cx="740" cy="100" r="2" fill="white" opacity="0.7"/>
  </g>

  <!-- Horizon glow -->
  <rect x="0" y="280" width="800" height="170" fill="url(#horizon)"/>

  <!-- Clouds -->
  <g opacity="0.15" fill="white">
    <ellipse cx="100" cy="350" rx="120" ry="30"/>
    <ellipse cx="80" cy="345" rx="80" ry="25"/>
    <ellipse cx="130" cy="348" rx="90" ry="22"/>
    <ellipse cx="600" cy="380" rx="150" ry="35"/>
    <ellipse cx="580" cy="375" rx="100" ry="28"/>
    <ellipse cx="640" cy="378" rx="110" ry="25"/>
  </g>

  <!-- Runway perspective lines -->
  <g opacity="0.3" stroke="#4fc3f7" stroke-width="1" fill="none">
    <line x1="400" y1="440" x2="200" y2="300"/>
    <line x1="400" y1="440" x2="600" y2="300"/>
    <line x1="400" y1="430" x2="250" y2="305"/>
    <line x1="400" y1="430" x2="550" y2="305"/>
  </g>

  <!-- Runway -->
  <polygon points="340,450 460,450 520,300 280,300" fill="#1a2540" opacity="0.6"/>
  <!-- Runway center line dashes -->
  <g stroke="white" stroke-width="3" stroke-dasharray="20,15" opacity="0.5">
    <line x1="400" y1="440" x2="400" y2="300"/>
  </g>
  <!-- Runway edge lines -->
  <line x1="340" y1="450" x2="280" y2="300" stroke="white" stroke-width="2" opacity="0.4"/>
  <line x1="460" y1="450" x2="520" y2="300" stroke="white" stroke-width="2" opacity="0.4"/>

  <!-- Airplane silhouette - taking off -->
  <g transform="translate(420, 200) rotate(-15)" filter="url(#glow-filter)">
    <!-- Fuselage -->
    <ellipse cx="0" cy="0" rx="65" ry="10" fill="#e3f2fd" opacity="0.95"/>
    <!-- Nose -->
    <ellipse cx="60" cy="0" rx="15" ry="7" fill="#bbdefb" opacity="0.9"/>
    <!-- Main wings -->
    <polygon points="-10,-8 -30,-45 -50,-50 -45,-8 20,-8 15,-45 0,-48" fill="#90caf9" opacity="0.9"/>
    <!-- Tail wing -->
    <polygon points="-55,-5 -70,-28 -78,-30 -75,-5" fill="#90caf9" opacity="0.9"/>
    <polygon points="-55,5 -70,28 -78,30 -75,5" fill="#90caf9" opacity="0.85"/>
    <!-- Vertical tail -->
    <polygon points="-55,-5 -55,3 -75,3 -80,-18 -72,-20" fill="#90caf9" opacity="0.9"/>
    <!-- Engine 1 -->
    <ellipse cx="-15" cy="-38" rx="12" ry="5" fill="#64b5f6" opacity="0.9"/>
    <!-- Engine 2 -->
    <ellipse cx="-15" cy="38" rx="12" ry="5" fill="#64b5f6" opacity="0.9"/>
    <!-- Windows -->
    <g fill="#ffffff" opacity="0.7">
      <rect x="20" y="-4" width="6" height="5" rx="1"/>
      <rect x="30" y="-4" width="6" height="5" rx="1"/>
      <rect x="40" y="-4" width="6" height="5" rx="1"/>
      <rect x="10" y="-4" width="6" height="5" rx="1"/>
    </g>
  </g>

  <!-- Engine glow/trail -->
  <g transform="translate(340, 220) rotate(-15)" opacity="0.4">
    <ellipse cx="0" cy="0" rx="30" ry="6" fill="#4fc3f7" filter="url(#blur1)"/>
    <ellipse cx="-20" cy="0" rx="20" ry="3" fill="#81d4fa" filter="url(#blur1)"/>
  </g>

  <!-- Navigation lights -->
  <circle cx="370" cy="185" r="3" fill="#ff5252" opacity="0.9" filter="url(#blur1)"/>
  <circle cx="472" cy="185" r="3" fill="#69f0ae" opacity="0.9" filter="url(#blur1)"/>

  <!-- Text overlay -->
  <g>
    <rect x="0" y="380" width="800" height="70" fill="url(#glow1)"/>
    <text x="40" y="415" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="white" opacity="0.95">Pre-Aviation English</text>
    <text x="40" y="438" font-family="system-ui, sans-serif" font-size="13" fill="#90caf9" opacity="0.85">Основы авиационного английского · Начальный уровень</text>
  </g>

  <!-- Top gradient overlay -->
  <rect x="0" y="0" width="800" height="80" fill="url(#sky1)" opacity="0.3"/>
</svg>
