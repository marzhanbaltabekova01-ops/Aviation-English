<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="sky2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="tower-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a2744"/>
      <stop offset="50%" style="stop-color:#253358"/>
      <stop offset="100%" style="stop-color:#1a2744"/>
    </linearGradient>
    <linearGradient id="glass-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4dd0e1;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#00838f;stop-opacity:0.4"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="800" height="450" fill="url(#sky2)"/>

  <!-- Stars -->
  <g opacity="0.6">
    <circle cx="40" cy="30" r="1" fill="white"/><circle cx="100" cy="50" r="1.5" fill="white"/>
    <circle cx="180" cy="20" r="1" fill="white"/><circle cx="260" cy="60" r="1" fill="white"/>
    <circle cx="320" cy="35" r="1.5" fill="white"/><circle cx="500" cy="25" r="1" fill="white"/>
    <circle cx="580" cy="55" r="1.5" fill="white"/><circle cx="660" cy="30" r="1" fill="white"/>
    <circle cx="740" cy="45" r="1" fill="white"/><circle cx="780" cy="20" r="1.5" fill="white"/>
    <circle cx="70" cy="120" r="1" fill="white"/><circle cx="150" cy="100" r="1.5" fill="white"/>
    <circle cx="430" cy="80" r="1" fill="white"/><circle cx="700" cy="90" r="1" fill="white"/>
  </g>

  <!-- City skyline silhouette in background -->
  <g fill="#0d1b2a" opacity="0.8">
    <rect x="0" y="320" width="60" height="130"/>
    <rect x="10" y="290" width="25" height="30"/>
    <rect x="70" y="310" width="50" height="140"/>
    <rect x="80" y="280" width="20" height="30"/>
    <rect x="130" y="330" width="40" height="120"/>
    <rect x="600" y="315" width="55" height="135"/>
    <rect x="610" y="285" width="20" height="30"/>
    <rect x="665" y="325" width="45" height="125"/>
    <rect x="720" y="305" width="50" height="145"/>
    <rect x="730" y="275" width="18" height="30"/>
    <rect x="775" y="320" width="25" height="130"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="390" width="800" height="60" fill="#0a1520"/>
  <rect x="0" y="388" width="800" height="6" fill="#1a3a5c" opacity="0.5"/>

  <!-- Radio waves from tower -->
  <g fill="none" stroke="#4dd0e1" opacity="0.15">
    <path d="M 390 220 Q 480 180 520 230" stroke-width="2"/>
    <path d="M 390 220 Q 500 150 560 220" stroke-width="1.5"/>
    <path d="M 390 220 Q 520 110 590 210" stroke-width="1"/>
    <path d="M 390 220 Q 300 180 260 230" stroke-width="2"/>
    <path d="M 390 220 Q 280 150 240 220" stroke-width="1.5"/>
    <path d="M 390 220 Q 260 110 210 210" stroke-width="1"/>
  </g>
  <!-- Animated-style wave rings -->
  <g fill="none" stroke="#4dd0e1" filter="url(#glow2)">
    <circle cx="390" cy="215" r="40" stroke-width="1.5" opacity="0.5"/>
    <circle cx="390" cy="215" r="80" stroke-width="1" opacity="0.3"/>
    <circle cx="390" cy="215" r="120" stroke-width="0.8" opacity="0.2"/>
    <circle cx="390" cy="215" r="160" stroke-width="0.6" opacity="0.15"/>
  </g>

  <!-- ATC Tower base -->
  <rect x="360" y="300" width="60" height="100" fill="url(#tower-grad)"/>
  <!-- Tower narrowing -->
  <polygon points="355,300 375,250 405,250 425,300" fill="#1e2f4d"/>
  <!-- Tower shaft -->
  <rect x="375" y="170" width="30" height="80" fill="#1e2f4d"/>
  <!-- Glass cab -->
  <polygon points="355,230 365,170 425,170 435,230" fill="url(#glass-grad)"/>
  <!-- Cab windows glow -->
  <polygon points="358,228 367,175 423,175 432,228" fill="#4dd0e1" opacity="0.15"/>
  <!-- Window frames -->
  <g stroke="#4dd0e1" stroke-width="0.8" fill="none" opacity="0.6">
    <line x1="390" y1="175" x2="390" y2="228"/>
    <line x1="358" y1="200" x2="432" y2="200"/>
    <line x1="362" y1="215" x2="428" y2="215"/>
  </g>
  <!-- Interior light -->
  <polygon points="362,226 370,178 410,178 418,226" fill="#00e5ff" opacity="0.08"/>
  <!-- Antenna -->
  <line x1="390" y1="170" x2="390" y2="130" stroke="#90a4ae" stroke-width="3"/>
  <circle cx="390" cy="128" r="4" fill="#f44336" filter="url(#glow2)"/>
  <circle cx="390" cy="128" r="8" fill="#f44336" filter="url(#softglow)" opacity="0.6"/>
  <!-- Side fins -->
  <line x1="380" y1="155" x2="365" y2="165" stroke="#546e7a" stroke-width="2"/>
  <line x1="400" y1="155" x2="415" y2="165" stroke="#546e7a" stroke-width="2"/>

  <!-- Tower windows (base) -->
  <g fill="#4dd0e1" opacity="0.3">
    <rect x="368" y="260" width="12" height="10" rx="1"/>
    <rect x="400" y="260" width="12" height="10" rx="1"/>
    <rect x="368" y="280" width="12" height="10" rx="1"/>
    <rect x="400" y="280" width="12" height="10" rx="1"/>
  </g>

  <!-- Airplane in distance -->
  <g transform="translate(620, 140) rotate(-8)" opacity="0.7">
    <ellipse cx="0" cy="0" rx="30" ry="4" fill="#b0bec5"/>
    <polygon points="-5,-3 -15,-18 -20,-20 -18,-3 8,-3" fill="#90a4ae"/>
    <polygon points="-25,-2 -32,-12 -37,-13 -35,-2" fill="#90a4ae"/>
    <ellipse cx="-8" cy="-16" rx="5" ry="2" fill="#78909c"/>
  </g>

  <!-- Ground lighting -->
  <g opacity="0.4">
    <circle cx="390" cy="392" r="40" fill="#1565c0" filter="url(#softglow)"/>
    <circle cx="200" cy="400" r="15" fill="#f57f17" filter="url(#softglow)"/>
    <circle cx="600" cy="400" r="15" fill="#f57f17" filter="url(#softglow)"/>
  </g>

  <!-- Text overlay -->
  <rect x="0" y="385" width="800" height="65" fill="#0a1520" opacity="0.8"/>
  <text x="40" y="413" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="white" opacity="0.95">ATC Phraseology · ICAO Level 3</text>
  <text x="40" y="436" font-family="system-ui, sans-serif" font-size="13" fill="#4dd0e1" opacity="0.85">Стандартная фразеология и радиообмен</text>
</svg>
